[[permission]]
identifier = "allow-project-fs"
description = "Allow mdcodeV project filesystem commands"
commands.allow = [
  "read_file",
  "write_file",
  "create_directory",
  "list_directory",
  "list_project_tree",
  "detect_project",
  "write_scaffold",
  "find_fxserver_binary",
  "start_fxserver",
  "stop_fxserver",
  "send_server_command",
  "fxserver_status",
  "find_fivem_client",
  "launch_fivem_connect",
  "list_plugin_files",
  "read_plugin_file",
  "ensure_plugins_dir",
  "sftp_connect",
  "sftp_disconnect",
  "sftp_status",
  "sftp_list_directory",
  "sftp_read_file",
  "sftp_write_file",
  "sftp_list_project_tree",
  "sftp_detect_project",
  "sftp_write_scaffold",
  "sftp_list_plugin_files",
  "sftp_ensure_plugins_dir",
  "ssh_exec",
  "ssh_send_console_command",
  "ssh_fetch_logs",
  "sql_connect",
  "sql_disconnect",
  "sql_status",
  "sql_query",
  "sql_list_databases",
  "sql_list_tables",
  "sql_describe_table",
  "sql_show_create_table",
  "sql_export_table_dump",
  "sql_execute_script",
  "sql_show_indexes",
  "sql_add_column",
  "sql_create_index",
  "sql_drop_index",
  "sql_keychain_save",
  "sql_keychain_get",
  "sql_keychain_delete",
]